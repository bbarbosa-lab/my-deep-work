<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My Deep Work{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{% if user %}/boards{% else %}/{% endif %}" class="brand">My Deep Work</a>
      <nav class="topnav">
        {% if user %}
          <a href="/boards">Boards</a>
          <a href="/settings">{{ user.display_name }}</a>
          <button id="btn-logout" class="btn btn-ghost">Sair</button>
        {% else %}
          <a href="/login">Entrar</a>
          <a href="/register" class="btn btn-primary btn-sm">Criar conta</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
